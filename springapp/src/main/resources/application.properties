# ===============================
# Server
# ===============================
server.port=8080

# ===============================
# Database
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/appdb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root123

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===============================
# JWT Configuration
# ===============================

# Secret key (minimum 256-bit key for HS256)
jwt.jwtsecret=abcdefghijklmnopqrstuvwxyz1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZkngfkakngalknaskgn

# Access token expiration (15 minutes in milliseconds)
jwt.access-token-expiration=86400000

# Refresh token expiration (7 days in milliseconds) - Optional
jwt.refresh-token-expiration=604800000

# ===============================
# Certificate Storage
# ===============================
certificate.storage-path=uploads/certificates

# ===============================
# Mail Configuration (disabled - no SMTP server)
# ===============================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration